name: Claude Merge (Reusable)

on:
  workflow_call:
    inputs:
      OPS_BRIDGE_INTERNAL_URL:
        type: string
        default: ''
      OPS_BRIDGE_GITHUB_AUDIENCE:
        type: string
        default: ''
      CLAUDE_ENABLE_CODEQL:
        type: string
        default: 'false'
      CLAUDE_REQUIRED_CHECKS:
        type: string
        default: 'build,claude-review'
      CLAUDE_PEER_REVIEW_BOTS:
        type: string
        default: 'github-copilot[bot],copilot-pull-request-reviewer[bot]'
      CLAUDE_REQUIRE_PEER_REVIEW:
        type: string
        default: 'true'
      CLAUDE_AUTO_READY_DRAFTS:
        type: string
        default: ''
      CLAUDE_MERGE_TARGET_BRANCH:
        type: string
        default: ''
      CLAUDE_POST_MERGE_HEALTHCHECK_URL:
        type: string
        default: ''
      CLAUDE_POST_MERGE_HEALTHCHECK_URLS:
        type: string
        default: ''
      CLAUDE_POST_MERGE_HEALTHCHECK_SECONDS:
        type: string
        default: ''
      CLAUDE_POST_MERGE_HEALTHCHECK_INTERVAL_SECONDS:
        type: string
        default: ''
      CLAUDE_POST_MERGE_HEALTHCHECK_SUCCESS_STREAK:
        type: string
        default: ''
      CLAUDE_POST_MERGE_ROLLBACK_MODE:
        type: string
        default: ''

permissions:
  contents: write
  pull-requests: write
  checks: read
  id-token: write

jobs:
  claude-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout claude-ci pipeline
        uses: actions/checkout@v4
        with:
          repository: frasergibbs/claude-ci
          ref: v1
          path: .claude-pipeline

      - name: Link pipeline scripts
        run: |
          mkdir -p .github
          rm -rf .github/scripts
          ln -s "$GITHUB_WORKSPACE/.claude-pipeline/.github/scripts" .github/scripts

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Conditional squash merge
        run: node .github/scripts/claude-merge.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPS_BRIDGE_INTERNAL_URL: ${{ inputs.OPS_BRIDGE_INTERNAL_URL }}
          OPS_BRIDGE_GITHUB_AUDIENCE: ${{ inputs.OPS_BRIDGE_GITHUB_AUDIENCE }}
          CLAUDE_ENABLE_CODEQL: ${{ inputs.CLAUDE_ENABLE_CODEQL || 'false' }}
          CLAUDE_REQUIRED_CHECKS: ${{ inputs.CLAUDE_REQUIRED_CHECKS || 'build,claude-review' }}
          CLAUDE_PEER_REVIEW_BOTS: ${{ inputs.CLAUDE_PEER_REVIEW_BOTS || 'github-copilot[bot],copilot-pull-request-reviewer[bot]' }}
          CLAUDE_REQUIRE_PEER_REVIEW: ${{ inputs.CLAUDE_REQUIRE_PEER_REVIEW || 'true' }}
          CLAUDE_AUTO_READY_DRAFTS: ${{ inputs.CLAUDE_AUTO_READY_DRAFTS }}
          CLAUDE_MERGE_TARGET_BRANCH: ${{ inputs.CLAUDE_MERGE_TARGET_BRANCH }}
          CLAUDE_POST_MERGE_HEALTHCHECK_URL: ${{ inputs.CLAUDE_POST_MERGE_HEALTHCHECK_URL }}
          CLAUDE_POST_MERGE_HEALTHCHECK_URLS: ${{ inputs.CLAUDE_POST_MERGE_HEALTHCHECK_URLS }}
          CLAUDE_POST_MERGE_HEALTHCHECK_SECONDS: ${{ inputs.CLAUDE_POST_MERGE_HEALTHCHECK_SECONDS }}
          CLAUDE_POST_MERGE_HEALTHCHECK_INTERVAL_SECONDS: ${{ inputs.CLAUDE_POST_MERGE_HEALTHCHECK_INTERVAL_SECONDS }}
          CLAUDE_POST_MERGE_HEALTHCHECK_SUCCESS_STREAK: ${{ inputs.CLAUDE_POST_MERGE_HEALTHCHECK_SUCCESS_STREAK }}
          CLAUDE_POST_MERGE_ROLLBACK_MODE: ${{ inputs.CLAUDE_POST_MERGE_ROLLBACK_MODE }}
