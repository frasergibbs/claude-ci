name: Claude Merge

on:
  workflow_run:
    workflows: ["CI", "Claude Review"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read
  id-token: write

jobs:
  claude-merge:
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    uses: frasergibbs/claude-ci/.github/workflows/claude-merge.yml@v1
    with:
      OPS_BRIDGE_INTERNAL_URL: ${{ vars.OPS_BRIDGE_INTERNAL_URL }}
      OPS_BRIDGE_GITHUB_AUDIENCE: ${{ vars.OPS_BRIDGE_GITHUB_AUDIENCE }}
      CLAUDE_ENABLE_CODEQL: ${{ vars.CLAUDE_ENABLE_CODEQL }}
      CLAUDE_REQUIRED_CHECKS: ${{ vars.CLAUDE_REQUIRED_CHECKS }}
      CLAUDE_PEER_REVIEW_BOTS: ${{ vars.CLAUDE_PEER_REVIEW_BOTS }}
      CLAUDE_REQUIRE_PEER_REVIEW: ${{ vars.CLAUDE_REQUIRE_PEER_REVIEW }}
      CLAUDE_AUTO_READY_DRAFTS: ${{ vars.CLAUDE_AUTO_READY_DRAFTS }}
      CLAUDE_POST_MERGE_HEALTHCHECK_URL: ${{ vars.CLAUDE_POST_MERGE_HEALTHCHECK_URL }}
      CLAUDE_POST_MERGE_HEALTHCHECK_URLS: ${{ vars.CLAUDE_POST_MERGE_HEALTHCHECK_URLS }}
      CLAUDE_POST_MERGE_HEALTHCHECK_SECONDS: ${{ vars.CLAUDE_POST_MERGE_HEALTHCHECK_SECONDS }}
      CLAUDE_POST_MERGE_HEALTHCHECK_INTERVAL_SECONDS: ${{ vars.CLAUDE_POST_MERGE_HEALTHCHECK_INTERVAL_SECONDS }}
      CLAUDE_POST_MERGE_HEALTHCHECK_SUCCESS_STREAK: ${{ vars.CLAUDE_POST_MERGE_HEALTHCHECK_SUCCESS_STREAK }}
      CLAUDE_POST_MERGE_ROLLBACK_MODE: ${{ vars.CLAUDE_POST_MERGE_ROLLBACK_MODE }}
    secrets: inherit
