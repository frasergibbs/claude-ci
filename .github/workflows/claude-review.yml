name: Claude Review

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]

permissions:
  contents: write
  pull-requests: write
  checks: read
  id-token: write
  actions: read
  security-events: write

jobs:
  claude-review:
    uses: frasergibbs/claude-ci/.github/workflows/claude-review.yml@v1
    with:
      OPS_BRIDGE_INTERNAL_URL: ${{ vars.OPS_BRIDGE_INTERNAL_URL }}
      OPS_BRIDGE_GITHUB_AUDIENCE: ${{ vars.OPS_BRIDGE_GITHUB_AUDIENCE }}
      CLAUDE_QUALITY_BASELINE_COMMAND: ${{ vars.CLAUDE_QUALITY_BASELINE_COMMAND }}
      CLAUDE_MAX_FIX_ROUNDS: ${{ vars.CLAUDE_MAX_FIX_ROUNDS }}
      CLAUDE_MIN_TEST_MATCH_RATIO: ${{ vars.CLAUDE_MIN_TEST_MATCH_RATIO }}
      CLAUDE_MIN_DIFF_COVERAGE_RATIO: ${{ vars.CLAUDE_MIN_DIFF_COVERAGE_RATIO }}
      CLAUDE_TARGETED_TEST_COMMAND: ${{ vars.CLAUDE_TARGETED_TEST_COMMAND }}
      CLAUDE_AUTOFIX_ALLOWED_PATHS: ${{ vars.CLAUDE_AUTOFIX_ALLOWED_PATHS }}
      CLAUDE_AUTOFIX_BLOCKED_PATTERNS: ${{ vars.CLAUDE_AUTOFIX_BLOCKED_PATTERNS }}
      CLAUDE_AUTOFIX_ALLOW_BLOCKED: ${{ vars.CLAUDE_AUTOFIX_ALLOW_BLOCKED }}
      CLAUDE_AUTOFIX_ALLOW_LOCKFILES: ${{ vars.CLAUDE_AUTOFIX_ALLOW_LOCKFILES }}
      CLAUDE_PEER_REVIEW_BOTS: ${{ vars.CLAUDE_PEER_REVIEW_BOTS }}
      CLAUDE_REQUIRE_PEER_REVIEW: ${{ vars.CLAUDE_REQUIRE_PEER_REVIEW }}
      CLAUDE_PEER_REVIEW_TIMEOUT_SECONDS: ${{ vars.CLAUDE_PEER_REVIEW_TIMEOUT_SECONDS }}
      CLAUDE_PEER_REVIEW_FINAL_TIMEOUT_SECONDS: ${{ vars.CLAUDE_PEER_REVIEW_FINAL_TIMEOUT_SECONDS }}
      CLAUDE_PEER_REVIEW_INTERVAL_SECONDS: ${{ vars.CLAUDE_PEER_REVIEW_INTERVAL_SECONDS }}
      CLAUDE_ENABLE_CODEQL: ${{ vars.CLAUDE_ENABLE_CODEQL }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    secrets: inherit
